name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  # APK ထုတ်လုပ်ရန်အတွက် ဤနေရာတွင် false ဟု ပြောင်းလဲပေးရပါမည်
  CI_CORE_ONLY: "false"
  JAVA_VERSION: "25"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build APK and Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Disable Kotlin incremental compilation (CI)
        run: |
          mkdir -p ~/.gradle
          echo "kotlin.incremental=false" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # APK အစစ် ထုတ်လုပ်ပေးမည့် အဆင့်
      - name: Build Android APK
        run: ./gradlew assembleDebug --console=plain --stacktrace

      # အဓိက unit tests များကိုသာ ပတ်ပြီး စစ်ဆေးရန်
      - name: Unit tests
        run: ./gradlew test -x :build-engine:test -x :android-support:test -x :lang-kotlin:test --console=plain --stacktrace

      # ထွက်လာသည့် APK အစစ်အား GitHub ပေါ်တွင် သိမ်းဆည်းရန်
      - name: Upload Artifacts (APK & Reports)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: devstudio-build-artifacts
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
